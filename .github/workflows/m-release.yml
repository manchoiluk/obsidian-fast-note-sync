name: Manual Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag (e.g. 1.25.0). If empty, uses version from manifest.json'
        required: false
        default: ''
      release_note:
        description: 'Release notes / Changelog'
        required: false
        default: 'Manual Release'

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  NAME: ${{ github.event.repository.name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.actor == 'haierkeys'
    env:
      CNB_TOKEN: ${{ secrets.CNB_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: Resolve Version
        id: version
        run: |
          INPUT_TAG="${{ github.event.inputs.tag_name }}"
          if [ -z "$INPUT_TAG" ]; then
            CURRENT_VERSION=$(jq -r .version manifest.json)
            echo "Using version from manifest.json: $CURRENT_VERSION"
            echo "tag=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Using manual tag: $INPUT_TAG"
            echo "tag=$INPUT_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: |
          pnpm install
          pnpm run build
          # Prepare assets
          PKG_NAME="fast-note-sync"
          mkdir -p ${PKG_NAME}
          cp main.js manifest.json styles.css ${PKG_NAME}
          zip -r ${PKG_NAME}-v${{ steps.version.outputs.tag }}.zip ${PKG_NAME}
          echo "${{ github.event.inputs.release_note }}" > changelog.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: ${{ github.event.inputs.release_note }}
          target_commitish: ${{ github.sha }}
          overwrite_files: true
          files: |
            main.js
            manifest.json
            styles.css
            changelog.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Artifact Attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Sync to CNB (Optional)
        # 仅在配置了 CNB_TOKEN 时运行
        if: env.CNB_TOKEN != ''
        env:
          CNB_REPO: haierkeys/obsidian-fast-note-sync
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_BODY: ${{ github.event.inputs.release_note }}
          ZIP_FILE: fast-note-sync-v${{ steps.version.outputs.tag }}.zip
        run: |
          # 尝试推送 tag 到 CNB
          git tag "${RELEASE_TAG}" || true
          git remote add cnb "https://cnb:${CNB_TOKEN}@cnb.cool/${CNB_REPO}.git" || true
          git push cnb "${RELEASE_TAG}" --force

          # 创建 CNB Release (简化逻辑，调用现有 API 脚本思路)
          # 注意：这里使用了 curl 逻辑，为了保持与原 release.yml 一致
          set -e
          RELEASE_RESPONSE=$(curl -s -X POST \
            -H "Accept: application/vnd.cnb.api+json" \
            -H "Authorization: Bearer ${CNB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg tag "${RELEASE_TAG}" \
              --arg name "${RELEASE_TAG}" \
              --arg body "${RELEASE_BODY}" \
              '{tag_name: $tag, name: $name, body: $body, prerelease: false, draft: false}')" \
            "https://api.cnb.cool/${CNB_REPO}/-/releases")
          
          RELEASE_ID=$(echo "$RELEASE_RESPONSE" | jq -r '.id')
          if [ "$RELEASE_ID" = "null" ] || [ -z "$RELEASE_ID" ]; then
             echo "Release already exists or failed to create, fetching ID..."
             RELEASE_ID=$(curl -s -H "Authorization: Bearer ${CNB_TOKEN}" "https://api.cnb.cool/${CNB_REPO}/-/releases" | jq -r ".[] | select(.tag_name==\"${RELEASE_TAG}\") | .id")
          fi

          FILES=("${ZIP_FILE}" "main.js" "manifest.json" "styles.css" "changelog.txt")
          for FILE_NAME in "${FILES[@]}"; do
            if [ -f "$FILE_NAME" ]; then
              FILE_SIZE=$(stat -c%s "$FILE_NAME")
              UPLOAD_INFO=$(curl -s -X POST \
                -H "Accept: application/vnd.cnb.api+json" \
                -H "Authorization: Bearer ${CNB_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$(jq -n --arg name "${FILE_NAME}" --argjson size ${FILE_SIZE} '{asset_name: $name, size: $size, overwrite: true}')" \
                "https://api.cnb.cool/${CNB_REPO}/-/releases/${RELEASE_ID}/asset-upload-url")
              
              UPLOAD_URL=$(echo "$UPLOAD_INFO" | jq -r '.upload_url')
              VERIFY_URL=$(echo "$UPLOAD_INFO" | jq -r '.verify_url')
              
              curl -s -X PUT -H "Content-Type: application/octet-stream" --data-binary @"$FILE_NAME" "$UPLOAD_URL"
              curl -s -X POST -H "Authorization: Bearer ${CNB_TOKEN}" "${VERIFY_URL}"
              echo "Uploaded $FILE_NAME to CNB"
            fi
          done
